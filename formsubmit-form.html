<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - FormSubmit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #354d91;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2a3d75;
        }
        .info {
            background: #d9edf7;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .error {
            background: #f2dede;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #a94442;
        }
        .success {
            background: #dff0d8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #3c763d;
        }
    </style>
</head>
<body>
    <h1>Contact Form</h1>
    
    <div class="info">
        <strong>Important:</strong> After your first submission, check vorkachev2@gmail.com for a confirmation email from FormSubmit. You MUST click the confirmation link before the form works.
    </div>
    
    <form action="https://formsubmit.co/vorkachev2@gmail.com" method="POST" id="contactForm">
        <!-- FormSubmit settings - using correct format -->
        <input type="hidden" name="_subject" value="New message from website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        
        <!-- Email field -->
        <label for="email">Your Email *</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
        
        <!-- Name field -->
        <label for="name">Your Name *</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
        
        <!-- Message field -->
        <label for="message">Your Message *</label>
        <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
        
        <button type="submit" id="submitBtn">Send Message</button>
    </form>
    
    <div id="responseMessage"></div>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var form = this;
            var submitBtn = document.getElementById('submitBtn');
            var responseMsg = document.getElementById('responseMessage');
            
            // Disable button to prevent double submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            responseMsg.innerHTML = '<div class="info">Sending your message...</div>';
            
            // Get form data
            var formData = new FormData(form);
            
            // Use fetch to send to FormSubmit
            fetch('https://formsubmit.co/ajax', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    responseMsg.innerHTML = '<div class="success">✓ Message sent successfully! If this is your first submission, check vorkachev2@gmail.com for a confirmation email.</div>';
                    form.reset();
                } else {
                    responseMsg.innerHTML = '<div class="error">✗ Error: ' + (data.message || 'Please try again') + '</div>';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                responseMsg.innerHTML = '<div class="error">✗ Error sending message. Please try again later.</div>';
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            });
        });
    </script>
</body>
</html>
