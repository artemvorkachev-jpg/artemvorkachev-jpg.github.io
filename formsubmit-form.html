<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - FormSubmit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #354d91;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2a3d75;
        }
        .success-message {
            display: none;
            background: #dff0d8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Contact Form</h1>
    <p>Send a message to vorkachev2@gmail.com</p>
    
    <div class="success-message" id="successMsg">
        Thank you! Your message has been sent successfully.
    </div>
    
    <form action="https://formsubmit.co/vorkachev2@gmail.com" method="POST" id="contactForm">
        <!-- FormSubmit settings -->
        <input type="hidden" name="_subject" value="New message from website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://artemvorkachev-jpg.github.io/formsubmit-form.html?sent=true">
        
        <!-- Email field (required by FormSubmit) -->
        <label for="email">Your Email *</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
        
        <!-- Name field -->
        <label for="name">Your Name *</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
        
        <!-- Message field -->
        <label for="message">Your Message *</label>
        <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
        
        <button type="submit">Send Message</button>
    </form>
    
    <script>
        // Show success message if redirected back
        if (window.location.search.includes('sent=true')) {
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>
