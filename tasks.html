<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список выполненных задач</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .task-counter {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .task-list {
            width: 100%;
            max-width: 600px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        .task-item {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h2>Список выполненных задач</h2>
    <div class="task-counter">Всего задач выполнено: <span id="taskCount">0</span></div>
    <div class="task-list" id="taskList">
        <!-- Задачи будут добавляться сюда -->
    </div>

    <script>
        let tasks = [];

        function addTask(task) {
            tasks.push(task);
            updateTaskList();
        }

        function updateTaskList() {
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                taskItem.textContent = `${index + 1}. ${task}`;
                taskList.appendChild(taskItem);
            });
            
            taskCount.textContent = tasks.length;
        }

        // Пример: добавление задачи через 5 секунд
        setTimeout(() => {
            addTask('Задача 1 выполнена');
        }, 5000);

        // Пример: добавление еще одной задачи через 10 секунд
        setTimeout(() => {
            addTask('Задача 2 выполнена');
        }, 10000);
    </script>

</body>
</html>
